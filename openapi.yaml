openapi: 3.1.0
info:
  title: HouseLoop CRM API
  version: 1.0.0
  description: |
    The complete REST API for HouseLoop CRM. Every UI action has a corresponding
    endpoint. Myli uses these to read and write CRM data on every layer.
  contact:
    name: HouseLoop Engineering
    url: https://houseloop.ai

servers:
  - url: http://localhost:3020/api
    description: Local development
  - url: https://crm.houseloop.ai/api
    description: Production

security:
  - sessionCookie: []

tags:
  - name: Leads
    description: Contacts in the pipeline
  - name: Stages
    description: Pipeline stages (Buyer + Seller pipelines)
  - name: Lead Sources
    description: Where leads originate
  - name: Tags
    description: Labels applied to leads
  - name: Tasks
    description: Follow-up tasks linked to leads
  - name: Email Templates
    description: Saved email bodies for campaigns
  - name: Email Campaigns
    description: Bulk email send campaigns
  - name: Text Templates
    description: Saved SMS/iMessage message bodies
  - name: Calendar Events
    description: Appointments and calendar entries
  - name: Team
    description: CRM user accounts
  - name: Smart Filters
    description: Saved lead filter sets
  - name: Options
    description: Lookup data for dropdowns (stages, sources, tags, users)
  - name: Auth
    description: Session management
  - name: Profile
    description: Current user profile read + edit
  - name: Notifications
    description: Per-user notification channel + preference config
  - name: Email Integration
    description: Per-user Gmail OAuth, outbound send, signatures, compliance
  - name: Email Infrastructure
    description: Org-wide sending inboxes + Instantly/Resend provider config
  - name: Email Lists
    description: Static + smart segmentation of leads
  - name: Calendar Integration
    description: Per-user Google Calendar OAuth, sync, settings
  - name: iMessage (BlueBubbles)
    description: iMessage send + history via BlueBubbles bridge on Camp David
  - name: Phone
    description: Twilio dialer assignments, SMS send, voice/SMS webhooks
  - name: System
    description: Operational health endpoints

# ─────────────────────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ── AUTH ────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Session cookie set, user returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkUser"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [Auth]
      summary: End the current session
      responses:
        "200":
          description: Session cleared

  # ── LEADS ───────────────────────────────────────────────────────────────────

  /leads:
    get:
      tags: [Leads]
      summary: List leads (with optional advanced filter)
      description: |
        Returns up to 500 leads. Pass `criteria` (JSON-encoded FilterCondition[]) to apply
        advanced filters, or `sf` (smart-filter UUID) to load a saved filter set.
      parameters:
        - name: criteria
          in: query
          description: JSON-encoded array of FilterCondition objects
          schema: { type: string }
        - name: sf
          in: query
          description: Smart-filter UUID — loads saved criteria and runs the same query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: List of leads + total count
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  leads:
                    type: array
                    items: { $ref: "#/components/schemas/Lead" }
                  total: { type: integer }

    post:
      tags: [Leads]
      summary: Create a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "200":
          description: Lead created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  id: { type: string, format: uuid }
        "409":
          description: Email already exists

  /leads/search:
    get:
      tags: [Leads]
      summary: Fuzzy search leads by name, email, or phone
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
          description: Search term
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Matching leads
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  leads:
                    type: array
                    items: { $ref: "#/components/schemas/LeadSummary" }

  /leads/bulk:
    post:
      tags: [Leads]
      summary: Bulk operations on leads
      description: |
        Supported actions: `delete` (soft-delete), `assign_stage`, `assign_user`, `add_tag`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, ids]
              properties:
                action:
                  type: string
                  enum: [delete, assign_stage, assign_user, add_tag]
                ids:
                  type: array
                  items: { type: string, format: uuid }
                stage_id: { type: string, format: uuid }
                user_id: { type: string, format: uuid }
                tag_id: { type: string, format: uuid }
      responses:
        "200":
          description: Bulk action applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  affected: { type: integer }

  /leads/{id}:
    patch:
      tags: [Leads]
      summary: Update a lead
      description: |
        Update any lead field. When `stage_id` changes, a `hl_stage_transitions` row
        is written — this powers the days_avg and conversion metrics on the Stages page.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                name: { type: string }
                email: { type: string, format: email }
                phone: { type: string }
                source: { type: string }
                source_id: { type: string, format: uuid, nullable: true }
                assigned_user_id: { type: string, format: uuid, nullable: true }
                lead_score: { type: integer }
                pipeline_id: { type: string, format: uuid, nullable: true }
                stage_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Move the lead to this stage. Pass null to clear.
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [Leads]
      summary: Soft-delete a lead (move to Trash)
      description: Sets `deleted_at` and `status='trash'`. The row is recoverable.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/OkId"
        "404":
          $ref: "#/components/responses/NotFound"

  /leads/{id}/pipeline:
    post:
      tags: [Leads]
      summary: Move a lead to a specific stage within one pipeline
      description: |
        Upserts `hl_lead_pipeline_memberships` for `(lead_id, pipeline_id)` so the lead's
        Buyer pipeline state can change independently of their Seller pipeline state.
        A `hl_stage_transitions` row is written when the stage actually changes (skipped
        for self-transitions).

        Used by the stage stepper + Buyer/Seller chip dropdown in the lead detail header.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pipeline_id, stage_id]
              properties:
                pipeline_id: { type: string, format: uuid }
                stage_id:
                  type: string
                  format: uuid
                  description: "Must belong to pipeline_id (validated server-side)"
      responses:
        "200":
          description: Stage updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  pipeline_id: { type: string, format: uuid }
                  stage_id: { type: string, format: uuid }
                  from_stage_id: { type: string, format: uuid, nullable: true }
        "400":
          description: "stage_id does not belong to pipeline_id"
        "404":
          $ref: "#/components/responses/NotFound"

  /leads/{id}/notes:
    post:
      tags: [Leads]
      summary: Append a note to a lead
      description: |
        Inserts a `hl_notes` row with `entity_type='lead'`, `entity_id=<lead>`,
        `source='lead_detail_action'`. Author is resolved from the session cookie.
        Notes appear in the lead detail timeline's Notes tab.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, description: "Note body — trimmed; must be non-empty" }
      responses:
        "200":
          description: Note created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  id: { type: string, format: uuid }
                  created_at: { type: string, format: date-time }
        "422":
          description: "Note body is required"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── APPOINTMENT DISPOSITION ────────────────────────────────────────────────

  /appointment-types:
    get:
      tags: [Calendar Events]
      summary: List active appointment types
      description: |
        Read from `hl_appointment_types` in `sort_order`. Drives the scheduler
        dropdown in `CreateEventModal`. Some types carry a `stage_advance_to_stage_id`
        — scheduling those types advances the lead's pipeline membership.
      responses:
        "200":
          description: Active appointment types
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  types:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string, example: "first_buyer_appointment" }
                        label: { type: string, example: "First Buyer Appointment" }
                        color: { type: string, nullable: true }
                        sort_order: { type: integer }

  /appointments/{id}/outcome:
    patch:
      tags: [Calendar Events]
      summary: Disposition an appointment (Myli + UI)
      description: |
        Writes `hl_appointments.outcome`, `outcome_notes`, `outcome_at`, `outcome_by`.
        Auto-bumps `status` (no_show, cancelled, rescheduled, completed) only when
        the appointment is still `scheduled` — manual statuses are never clobbered.

        **Auto-advance:** if the outcome row has a non-null
        `stage_advance_to_stage_id`, the lead's pipeline membership for that
        stage's pipeline is bumped FORWARD ONLY. A `hl_stage_transitions` row
        is written with `reason='appointment outcome: <outcome key>'`.

        Outcome behavior is pre-seeded — `met_with_customer_first` advances
        Buyer → "1st Appointment Met", `met_with_customer_showing` advances
        Buyer → "Showing Homes", `listing_signed` advances Seller → "Listing
        Agreement", `listing_not_signed` advances nothing (UI shows a
        nurture/junk/DNC hint banner instead).

        Outcomes are filtered in the UI by appointment type via
        `hl_appointment_outcomes.valid_for_types` (JSONB array, NULL = all types).
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                outcome:
                  type: string
                  nullable: true
                  description: "Outcome key from hl_appointment_outcomes — or null to clear"
                outcome_notes:
                  type: string
                  nullable: true
                  description: "Freeform feedback. Auto-clears when outcome is cleared."
                marked_by:
                  type: string
                  enum: [user, myli]
                  description: "Pass 'myli' from the agent runtime; defaults to session user."
      responses:
        "200":
          description: Outcome saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  appointment:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      outcome: { type: string, nullable: true }
                      outcome_notes: { type: string, nullable: true }
                      outcome_at: { type: string, format: date-time, nullable: true }
                      outcome_by: { type: string, nullable: true }
                      status: { type: string }
                  stage_advanced:
                    type: object
                    nullable: true
                    description: "Populated when outcome triggered a stage move; null otherwise"
                    properties:
                      pipeline_id: { type: string, format: uuid }
                      stage_id: { type: string, format: uuid }
                      from_stage_id: { type: string, format: uuid, nullable: true }
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: "Unknown outcome key OR neither outcome nor outcome_notes supplied"

  # ── STAGES ──────────────────────────────────────────────────────────────────

  /stages:
    get:
      tags: [Stages]
      summary: List stages for a pipeline
      description: Returns stages with live metrics (people count, avg days, conversion %).
      parameters:
        - name: pipelineId
          in: query
          description: Pipeline UUID. Defaults to the pipeline marked `is_default`.
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Stages with metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  stages:
                    type: array
                    items: { $ref: "#/components/schemas/Stage" }

    post:
      tags: [Stages]
      summary: Create a stage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 60 }
                color: { type: string, description: "Hex color from the allowed palette" }
                icon: { type: string, description: "Lucide icon name" }
                is_active: { type: boolean, default: true }
                pipelineId: { type: string, format: uuid, description: "Defaults to default pipeline" }
      responses:
        "201":
          $ref: "#/components/responses/OkStage"
        "409":
          description: Stage name already exists in this pipeline

    patch:
      tags: [Stages]
      summary: Bulk reorder stages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      position: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /stages/{id}:
    patch:
      tags: [Stages]
      summary: Update a stage
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 60 }
                color: { type: string }
                icon: { type: string }
                is_active: { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/OkStage"
        "409":
          description: Name already taken in this pipeline

    delete:
      tags: [Stages]
      summary: Delete a stage
      description: |
        If leads are currently on this stage, you must supply `reassign_to`
        (a stage UUID in the same pipeline). The leads are moved before deletion.
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reassign_to:
                  type: string
                  format: uuid
                  description: Move leads to this stage before deleting
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "409":
          description: Stage has leads and reassign_to was not provided

  # ── LEAD SOURCES ────────────────────────────────────────────────────────────

  /lead-sources:
    get:
      tags: [Lead Sources]
      summary: List lead sources
      responses:
        "200":
          description: All active lead sources with total_leads count
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  sources:
                    type: array
                    items: { $ref: "#/components/schemas/LeadSource" }

    post:
      tags: [Lead Sources]
      summary: Create a lead source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                key: { type: string, description: "Machine-readable identifier" }
                color: { type: string }
                source_type: { type: string }
                default_stage_id: { type: string, format: uuid, nullable: true }
                is_active: { type: boolean, default: true }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /lead-sources/{id}:
    patch:
      tags: [Lead Sources]
      summary: Update a lead source
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                color: { type: string }
                default_stage_id: { type: string, format: uuid, nullable: true }
                is_active: { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

    delete:
      tags: [Lead Sources]
      summary: Delete a lead source
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── TAGS ────────────────────────────────────────────────────────────────────

  /tags:
    get:
      tags: [Tags]
      summary: List all tags with lead counts
      responses:
        "200":
          description: Tags
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  tags:
                    type: array
                    items: { $ref: "#/components/schemas/Tag" }

    post:
      tags: [Tags]
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 60 }
                color: { type: string }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /tags/{id}:
    patch:
      tags: [Tags]
      summary: Update a tag
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                color: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

    delete:
      tags: [Tags]
      summary: Delete a tag (detaches from all leads)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── TASKS ───────────────────────────────────────────────────────────────────

  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      parameters:
        - name: lead_id
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [open, done] }
        - name: overdue
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  tasks:
                    type: array
                    items: { $ref: "#/components/schemas/Task" }

    post:
      tags: [Tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, lead_id]
              properties:
                title: { type: string }
                lead_id: { type: string, format: uuid }
                due_at: { type: string, format: date-time }
                assigned_user_id: { type: string, format: uuid }
                notes: { type: string }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /tasks/{id}:
    patch:
      tags: [Tasks]
      summary: Update a task
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                status: { type: string, enum: [open, done] }
                due_at: { type: string, format: date-time }
                notes: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

    delete:
      tags: [Tasks]
      summary: Delete a task
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── EMAIL TEMPLATES ─────────────────────────────────────────────────────────

  /email/templates:
    get:
      tags: [Email Templates]
      summary: List email templates
      parameters:
        - name: category
          in: query
          description: Filter by category (listing_alert, open_house, market_report, etc.)
          schema: { type: string }
      responses:
        "200":
          description: Email templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  templates:
                    type: array
                    items: { $ref: "#/components/schemas/EmailTemplate" }

    post:
      tags: [Email Templates]
      summary: Create an email template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                category: { type: string }
                subject: { type: string }
                key: { type: string, description: "Unique machine key. Optional." }
                template_body: { type: string, description: "HTML body" }
      responses:
        "201":
          $ref: "#/components/responses/OkId"
        "409":
          description: Template key already exists

  /email/templates/{id}:
    patch:
      tags: [Email Templates]
      summary: Update an email template
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                category: { type: string }
                subject: { type: string }
                template_body: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

    delete:
      tags: [Email Templates]
      summary: Delete an email template
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/send-template:
    post:
      tags: [Email Templates]
      summary: Send an email template to a lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [template_id, lead_id]
              properties:
                template_id: { type: string, format: uuid }
                lead_id: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── EMAIL CAMPAIGNS ─────────────────────────────────────────────────────────

  /email/campaigns:
    get:
      tags: [Email Campaigns]
      summary: List campaigns
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  campaigns:
                    type: array
                    items: { $ref: "#/components/schemas/EmailCampaign" }

    post:
      tags: [Email Campaigns]
      summary: Create a campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /email/campaigns/{id}:
    get:
      tags: [Email Campaigns]
      summary: Get a campaign (with list + template details)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Campaign detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  campaign: { $ref: "#/components/schemas/EmailCampaignDetail" }

    patch:
      tags: [Email Campaigns]
      summary: Update a campaign
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

    delete:
      tags: [Email Campaigns]
      summary: Delete a campaign (any status)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/campaigns/{id}/send:
    post:
      tags: [Email Campaigns]
      summary: Trigger a campaign send
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── TEXT TEMPLATES ──────────────────────────────────────────────────────────

  /text-templates:
    get:
      tags: [Text Templates]
      summary: List text templates
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: visibility
          in: query
          schema: { type: string, enum: [public, private] }
      responses:
        "200":
          description: Text templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  templates:
                    type: array
                    items: { $ref: "#/components/schemas/TextTemplate" }

    post:
      tags: [Text Templates]
      summary: Create a text template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, body]
              properties:
                name: { type: string }
                body: { type: string, description: "Message text. Supports {{first_name}}, {{last_name}}, {{agent_name}} merge tags." }
                category: { type: string }
                visibility: { type: string, enum: [public, private], default: public }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /text-templates/{id}:
    patch:
      tags: [Text Templates]
      summary: Update a text template
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                body: { type: string }
                category: { type: string }
                visibility: { type: string, enum: [public, private] }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

    delete:
      tags: [Text Templates]
      summary: Delete a text template
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── CALENDAR EVENTS ─────────────────────────────────────────────────────────

  /calendar/events:
    get:
      tags: [Calendar Events]
      summary: List calendar events
      parameters:
        - name: lead_id
          in: query
          schema: { type: string, format: uuid }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  events:
                    type: array
                    items: { $ref: "#/components/schemas/CalendarEvent" }

    post:
      tags: [Calendar Events]
      summary: Create a calendar event (appointment) with optional stage auto-advance
      description: |
        Inserts a row into `hl_appointments`. If the user has Google Calendar export
        enabled, also creates the event in Google Calendar and stores the ID.

        **Schedule-driven stage advance:** if the chosen `type` has a non-null
        `stage_advance_to_stage_id` in `hl_appointment_types`, the lead's pipeline
        membership is bumped FORWARD ONLY. As of 2026-05-18:

        - `type='first_buyer_appointment'` → Buyer · "1st Appointment Set"
        - `type='listing_appointment'`     → Seller · "Appointment Set"
        - all other types → no advance

        Transitions are logged in `hl_stage_transitions` with
        `reason='appointment scheduled: <type>'`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarEventBody"
      responses:
        "201":
          description: Appointment created (with optional stage_advanced + google_event_id)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string, format: uuid }
                  google_event_id: { type: string, nullable: true }
                  google_sync_error: { type: string, nullable: true }
                  stage_advanced:
                    type: object
                    nullable: true
                    description: "Populated when type triggered a stage move; null otherwise"
                    properties:
                      pipeline_id: { type: string, format: uuid }
                      stage_id: { type: string, format: uuid }
                      from_stage_id: { type: string, format: uuid, nullable: true }

  /calendar/events/{id}:
    get:
      tags: [Calendar Events]
      summary: Get a calendar event
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Calendar event
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  event: { $ref: "#/components/schemas/CalendarEvent" }

    patch:
      tags: [Calendar Events]
      summary: Update a calendar event
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarEventBody"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

    delete:
      tags: [Calendar Events]
      summary: Delete a calendar event
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── TEAM ────────────────────────────────────────────────────────────────────

  /team/users:
    get:
      tags: [Team]
      summary: List team members
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/User" }

    post:
      tags: [Team]
      summary: Invite a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, full_name, role]
              properties:
                email: { type: string, format: email }
                full_name: { type: string }
                role: { type: string, enum: [admin, agent, viewer] }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /team/users/{id}:
    get:
      tags: [Team]
      summary: Get a team member
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user: { $ref: "#/components/schemas/User" }

    patch:
      tags: [Team]
      summary: Update a team member
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                role: { type: string, enum: [admin, agent, viewer] }
                is_active: { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── SMART FILTERS ───────────────────────────────────────────────────────────

  /smart-filters:
    get:
      tags: [Smart Filters]
      summary: List saved filter sets
      responses:
        "200":
          description: Smart filters
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  filters:
                    type: array
                    items: { $ref: "#/components/schemas/SmartFilter" }

    post:
      tags: [Smart Filters]
      summary: Save a filter set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, criteria]
              properties:
                name: { type: string }
                criteria:
                  type: array
                  description: Array of FilterCondition objects
                  items: { type: object }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /smart-filters/{id}:
    patch:
      tags: [Smart Filters]
      summary: Update a saved filter
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                criteria: { type: array, items: { type: object } }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

    delete:
      tags: [Smart Filters]
      summary: Delete a saved filter
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── OPTIONS (LOOKUP DATA) ───────────────────────────────────────────────────

  /options:
    get:
      tags: [Options]
      summary: Get all lookup data for filter dropdowns
      description: |
        Returns stages, lead sources, tags, and users in one call.
        Use this to populate filter panel dropdowns without making 4 separate requests.
      responses:
        "200":
          description: Lookup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  stages:
                    type: array
                    items: { $ref: "#/components/schemas/Stage" }
                  sources:
                    type: array
                    items: { $ref: "#/components/schemas/LeadSource" }
                  tags:
                    type: array
                    items: { $ref: "#/components/schemas/Tag" }
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/User" }

  # ── AUTH (additional endpoints) ─────────────────────────────────────────────

  /auth/google:
    get:
      tags: [Auth]
      summary: Start Google sign-in (302 redirect)
      description: |
        Generates a Google OAuth URL with `openid email profile` scopes and
        302-redirects the browser. Set `next` cookie before redirecting to
        return the user to their original page after `/auth/google/callback`.
      responses:
        "302":
          description: Redirect to Google consent screen

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback (exchange code → session)
      description: |
        Google redirects here after consent. Exchanges `code` for tokens,
        verifies the email is in `hl_users`, mints a session cookie, and
        302-redirects to the `next` URL (or `/dashboard` if none).
      parameters:
        - { name: code,  in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
      responses:
        "302":
          description: Redirect after sign-in (success or `?auth=denied` on error)

  /auth/sso:
    get:
      tags: [Auth]
      summary: Short-lived SSO token redemption
      description: |
        Used by Lee's SSO bridge — accepts a one-time `t` token from the
        identity service, swaps it for a session cookie, redirects to `/dashboard`.
      parameters:
        - { name: t, in: query, required: true, schema: { type: string } }
      responses:
        "302":
          description: Redirect with session cookie set
        "401":
          description: Invalid or expired token

  /auth/setup:
    get:
      tags: [Auth]
      summary: Detect first-run state
      description: Returns `{ needs_setup: true }` when `hl_users` is empty.
      responses:
        "200":
          description: Setup state
          content:
            application/json:
              schema:
                type: object
                properties:
                  needs_setup: { type: boolean }
    post:
      tags: [Auth]
      summary: Create the first admin user
      description: |
        Only succeeds when `hl_users` is empty. Creates an admin user from the
        provided email + password and mints their session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, full_name]
              properties:
                email:     { type: string, format: email }
                password:  { type: string, format: password }
                full_name: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "409":
          description: Setup already complete (users exist)

  /auth/emulate:
    delete:
      tags: [Auth]
      summary: Exit emulation mode
      description: |
        Clears the emulation overlay cookie and restores the underlying
        admin session. Pairs with `POST /team/users/{id}/emulate`.
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── PROFILE ─────────────────────────────────────────────────────────────────

  /profile:
    get:
      tags: [Profile]
      summary: Get current user's full profile row
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user: { $ref: "#/components/schemas/User" }
    patch:
      tags: [Profile]
      summary: Update editable profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:        { type: string }
                avatar_url:       { type: string, nullable: true }
                phone:            { type: string, nullable: true }
                signature_html:   { type: string, nullable: true }
                timezone:         { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── NOTIFICATIONS ───────────────────────────────────────────────────────────

  /notification-channels:
    get:
      tags: [Notifications]
      summary: List configured notification channels
      description: Channels = Email + SMS + Push + Telegram + Slack with per-channel enabled flag.
      responses:
        "200":
          description: Channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        kind:    { type: string, example: "email" }
                        target:  { type: string, nullable: true }
                        enabled: { type: boolean }
    put:
      tags: [Notifications]
      summary: Replace the full channels array
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  type: array
                  items: { type: object }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /notification-preferences:
    get:
      tags: [Notifications]
      summary: Get the current user's per-event notification preferences
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  preferences: { type: object }
    put:
      tags: [Notifications]
      summary: Save the current user's notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferences: { type: object }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── TEAM (additional) ───────────────────────────────────────────────────────

  /team/users/{id}/emulate:
    post:
      tags: [Team]
      summary: Start emulating another user (admin only)
      description: |
        Sets an emulation overlay cookie that makes subsequent requests appear
        to come from `{id}`. The underlying admin session is preserved.
        End emulation with `DELETE /auth/emulate`.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          description: Caller is not an admin

  # ── TASKS (additional) ──────────────────────────────────────────────────────

  /tasks/bulk:
    post:
      tags: [Tasks]
      summary: Bulk complete / dismiss / delete tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_ids, action]
              properties:
                task_ids:
                  type: array
                  items: { type: string, format: uuid }
                action:
                  type: string
                  enum: [complete, dismiss, delete]
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── SYSTEM ──────────────────────────────────────────────────────────────────

  /db-health:
    get:
      tags: [System]
      summary: Database health check
      description: |
        Returns `{ ok: true, db: 'reachable' }` when the Postgres pool can
        execute `SELECT 1`. Used by Railway + uptime monitors.
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  db: { type: string }
        "503":
          description: DB unreachable

  # ── EMAIL INTEGRATION ───────────────────────────────────────────────────────

  /email/auth/connect:
    get:
      tags: [Email Integration]
      summary: Start Gmail OAuth (302 redirect)
      description: |
        Generates a Google OAuth URL with Gmail send + signature scopes.
        `inbox_id` ties the resulting tokens to a specific
        `hl_sending_inboxes` row (set when connecting an org inbox);
        `login_hint` pre-fills the Google account email.
      parameters:
        - { name: inbox_id,   in: query, schema: { type: string, format: uuid } }
        - { name: login_hint, in: query, schema: { type: string, format: email } }
      responses:
        "302":
          description: Redirect to Google consent

  /email/auth/callback:
    get:
      tags: [Email Integration]
      summary: Gmail OAuth callback (exchange code → tokens)
      description: |
        Google redirects here after Gmail consent. Stores refresh + access
        tokens on the user's row (or the inbox row when `state.inbox_id` is set)
        and redirects to `/settings/email?status=connected`.
      parameters:
        - { name: code,  in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
      responses:
        "302":
          description: Redirect after Gmail connect

  /email/status:
    get:
      tags: [Email Integration]
      summary: Connection status for the current user (or a specific inbox)
      parameters:
        - { name: inbox_id, in: query, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean }
                  connected:  { type: boolean }
                  email:      { type: string, nullable: true }
                  expires_at: { type: string, format: date-time, nullable: true }

  /email/disconnect:
    delete:
      tags: [Email Integration]
      summary: Revoke Gmail token + clear connection state
      parameters:
        - { name: inbox_id, in: query, schema: { type: string, format: uuid } }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/send:
    post:
      tags: [Email Integration]
      summary: Send a one-off email via the user's connected Gmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, body_html]
              properties:
                lead_id:   { type: string, format: uuid, nullable: true }
                to:        { type: string, format: email }
                cc:        { type: array, items: { type: string, format: email } }
                bcc:       { type: array, items: { type: string, format: email } }
                subject:   { type: string }
                body_html: { type: string }
                from_inbox_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: "Override the default sender — pass a hl_sending_inboxes row id"
      responses:
        "200":
          description: Sent (Gmail message id returned)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean }
                  message_id: { type: string }

  /email/senders:
    get:
      tags: [Email Integration]
      summary: List eligible senders for a campaign
      description: |
        Returns the set of `hl_sending_inboxes` rows that are warmed-up
        + authorized for the given `campaign_type`. The campaign editor
        feeds this into the "Send From" dropdown.
      parameters:
        - { name: campaign_type, in: query, required: true, schema: { type: string, enum: [outreach, nurture, transactional, alerts, marketing] } }
      responses:
        "200":
          description: Eligible senders
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  senders:
                    type: array
                    items:
                      type: object
                      properties:
                        id:    { type: string, format: uuid }
                        email: { type: string, format: email }
                        label: { type: string }
                        warmed_up: { type: boolean }

  /email/settings:
    patch:
      tags: [Email Integration]
      summary: Update per-user sync + domain-filter preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sync_enabled:        { type: boolean }
                domain_filter:       { type: array, items: { type: string } }
                inbound_to_inbox:    { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/signature:
    get:
      tags: [Email Integration]
      summary: Fetch saved signature for the connected Gmail account
      parameters:
        - { name: inbox_id, in: query, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Signature
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:        { type: boolean }
                  signature: { type: string, nullable: true }
    post:
      tags: [Email Integration]
      summary: Save / update the signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signature]
              properties:
                signature: { type: string }
                inbox_id:  { type: string, format: uuid, nullable: true }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/signature/import:
    post:
      tags: [Email Integration]
      summary: Pull the user's existing Gmail signature via the Gmail API
      description: |
        Reads the `sendAs` resource from Gmail Users API and copies the HTML
        into `hl_users.signature_html`. Idempotent — call again to refresh.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                inbox_id: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: Imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:        { type: boolean }
                  signature: { type: string }

  /email/compliance:
    get:
      tags: [Email Integration]
      summary: Read CAN-SPAM compliance config (footer, address, etc.)
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:                 { type: boolean }
                  business_name:      { type: string }
                  business_address:   { type: string }
                  unsubscribe_url:    { type: string, format: uri }
                  footer_html:        { type: string }
    patch:
      tags: [Email Integration]
      summary: Update compliance config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                business_name:    { type: string }
                business_address: { type: string }
                unsubscribe_url:  { type: string, format: uri }
                footer_html:      { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/team:
    get:
      tags: [Email Integration]
      summary: Per-user email connection status across the team
      description: |
        Returns each `hl_users` row with their Gmail connection state, last
        sync time, and inbox assignment — drives the Team Email settings table.
      responses:
        "200":
          description: Team email roster
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  team:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:    { type: string, format: uuid }
                        full_name:  { type: string }
                        email:      { type: string, format: email }
                        connected:  { type: boolean }
                        last_sync:  { type: string, format: date-time, nullable: true }

  /email/warmup-status:
    get:
      tags: [Email Integration]
      summary: Live warmup health for all sending inboxes (via Instantly.ai)
      description: |
        Fans out to Instantly's API and returns aggregated warmup score,
        sent count, replied count, spam count per inbox.
      responses:
        "200":
          description: Warmup snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  inboxes:
                    type: array
                    items:
                      type: object
                      properties:
                        inbox_id:    { type: string, format: uuid }
                        email:       { type: string, format: email }
                        warmup_score: { type: number }
                        sent:         { type: integer }
                        replied:      { type: integer }
                        spam:         { type: integer }

  # ── EMAIL INFRASTRUCTURE ────────────────────────────────────────────────────

  /email/infrastructure/inboxes:
    get:
      tags: [Email Infrastructure]
      summary: List all org sending inboxes with OAuth status
      responses:
        "200":
          description: Inboxes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  inboxes:
                    type: array
                    items: { $ref: "#/components/schemas/SendingInbox" }
    post:
      tags: [Email Infrastructure]
      summary: Add a new sending inbox (no OAuth yet — connect via /email/auth/connect)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, label, purpose]
              properties:
                email:   { type: string, format: email }
                label:   { type: string, example: "Outreach inbox 1" }
                purpose:
                  type: string
                  enum: [outreach, nurture, transactional, alerts, marketing]
                plan:
                  type: string
                  description: "Instantly plan tag (free/growth/scale) or 'native' for non-Instantly inboxes"
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /email/infrastructure/inboxes/{id}:
    patch:
      tags: [Email Infrastructure]
      summary: Update inbox label / purpose / plan
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:   { type: string }
                purpose:
                  type: string
                  enum: [outreach, nurture, transactional, alerts, marketing]
                plan:    { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Email Infrastructure]
      summary: Remove an inbox (custom inboxes only — system inboxes are protected)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          description: Refusal — inbox is system-managed

  /email/infrastructure/instantly:
    get:
      tags: [Email Infrastructure]
      summary: Instantly.ai connection status (key fingerprint only — never the full key)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:        { type: boolean }
                  connected: { type: boolean }
                  fingerprint: { type: string, nullable: true }
    post:
      tags: [Email Infrastructure]
      summary: Store + verify Instantly API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          description: Key rejected by Instantly
    delete:
      tags: [Email Infrastructure]
      summary: Remove stored Instantly config
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/infrastructure/resend:
    get:
      tags: [Email Infrastructure]
      summary: Resend connection status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:        { type: boolean }
                  connected: { type: boolean }
    post:
      tags: [Email Infrastructure]
      summary: Store + verify Resend API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Email Infrastructure]
      summary: Remove stored Resend config
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── EMAIL LISTS ─────────────────────────

  /email/lists:
    get:
      tags: [Email Lists]
      summary: List static + smart lists
      parameters:
        - { name: type,  in: query, schema: { type: string, enum: [static, smart] } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: Lists
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  lists:
                    type: array
                    items:
                      type: object
                      properties:
                        id:    { type: string, format: uuid }
                        name:  { type: string }
                        type:  { type: string, enum: [static, smart] }
                        size:  { type: integer }
    post:
      tags: [Email Lists]
      summary: Create a static or smart list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string }
                type: { type: string, enum: [static, smart] }
                criteria:
                  type: array
                  description: "FilterCondition[] for smart lists; omitted for static"
                  items: { type: object }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /email/lists/{id}:
    get:
      tags: [Email Lists]
      summary: Get a list with its criteria + member count
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: List
    patch:
      tags: [Email Lists]
      summary: Rename or rewrite criteria
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:     { type: string }
                criteria: { type: array, items: { type: object } }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Email Lists]
      summary: Delete a list (drops `hl_email_list_members` rows)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/lists/{id}/members:
    get:
      tags: [Email Lists]
      summary: List current members (static lists) or resolved leads (smart)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  leads:
                    type: array
                    items: { $ref: "#/components/schemas/Lead" }
    post:
      tags: [Email Lists]
      summary: Add lead IDs to a static list
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lead_ids]
              properties:
                lead_ids:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Email Lists]
      summary: Remove a single lead from a static list
      parameters:
        - $ref: "#/components/parameters/Id"
        - { name: lead_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── CALENDAR INTEGRATION ────────────────────────────────────────────────────

  /calendar/auth/connect:
    get:
      tags: [Calendar Integration]
      summary: Start Google Calendar OAuth (302 redirect)
      description: |
        Generates a Google OAuth URL with calendar scopes.
        Agents connect their PERSONAL Google account (no `hd` restriction).
        Uses `x-forwarded-host` + `x-forwarded-proto` to derive redirect_uri
        (Railway terminates SSL internally — `req.nextUrl.origin` is unreliable).
      responses:
        "302":
          description: Redirect to Google consent

  /calendar/auth/callback:
    get:
      tags: [Calendar Integration]
      summary: Google Calendar OAuth callback
      description: |
        Exchanges code for tokens, fetches the Google account email,
        upserts `hl_calendar_connections` for the CRM user, redirects to
        `/settings/calendar`.
      parameters:
        - { name: code,  in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
      responses:
        "302":
          description: Redirect after connect

  /calendar/settings:
    get:
      tags: [Calendar Integration]
      summary: Connection state + Google calendar list (for import/export pickers)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:               { type: boolean }
                  connected:        { type: boolean }
                  account_email:    { type: string, nullable: true }
                  import_calendar:  { type: string, nullable: true }
                  export_calendar:  { type: string, nullable: true }
                  sync_enabled:     { type: boolean }
                  calendars:
                    type: array
                    items:
                      type: object
                      properties:
                        id:      { type: string }
                        summary: { type: string }
                        primary: { type: boolean }
    patch:
      tags: [Calendar Integration]
      summary: Update import/export calendar selection + sync toggle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                import_calendar_id: { type: string, nullable: true }
                export_calendar_id: { type: string, nullable: true }
                import_enabled:     { type: boolean }
                export_enabled:     { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Calendar Integration]
      summary: Disconnect — drops the connection row + clears event linkage
      description: |
        ON DELETE CASCADE drops `hl_calendar_events`. Sets `calendar_event_id`
        and `calendar_provider` to NULL on appointments that were synced
        to Google (the appointments themselves stay).
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /calendar/sync:
    post:
      tags: [Calendar Integration]
      summary: Trigger an incremental import from Google Calendar
      description: |
        Pulls events using `nextSyncToken`. Falls back to a full sync if the
        token expires (HTTP 410). Full sync covers -30 to +60 days.
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:           { type: boolean }
                  imported:     { type: integer }
                  updated:      { type: integer }
                  deleted:      { type: integer }
                  full_sync:    { type: boolean }

  # ── iMESSAGE (BlueBubbles) ──────────────────────────────────────────────────

  /bluebubbles:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: BlueBubbles server health + webhook list
      description: |
        Hits the BlueBubbles bridge on Camp David (`BB_URL`) and returns
        connection state, message + attachment totals, and registered webhooks.
      responses:
        "200":
          description: BlueBubbles health
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:                { type: boolean }
                  connected:         { type: boolean }
                  server_url:        { type: string }
                  message_count:     { type: integer, nullable: true }
                  attachment_count:  { type: integer, nullable: true }
                  webhooks:
                    type: array
                    items: { type: object }

  /bb/send:
    post:
      tags: [iMessage (BlueBubbles)]
      summary: Send an iMessage via BlueBubbles
      description: |
        Forwards to `${BB_URL}/api/v1/message/text`. `from_handle` selects the
        sending identity when multiple iMessage handles are configured on the host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, message]
              properties:
                to:          { type: string, description: "iMessage address — phone (E.164) or apple id email" }
                message:     { type: string }
                lead_id:     { type: string, format: uuid, nullable: true, description: "Link the send to a lead (writes hl_bb_events row)" }
                from_handle: { type: string, nullable: true, description: "Sender handle override; defaults to bb/settings preferred handle" }
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:   { type: boolean }
                  guid: { type: string }
        "400":
          description: Missing required fields
        "502":
          description: BlueBubbles unreachable

  /bb/inbound:
    post:
      tags: [iMessage (BlueBubbles)]
      summary: BlueBubbles webhook — inbound iMessage delivery
      description: |
        BlueBubbles posts here for `new-message` and `updated-message` events.
        Inserts/updates `hl_bb_events`. Bearer auth via `?password=` query (set
        when registering the webhook). Inbound is dual-routed to PA + HouseLoop —
        the handler attributes per-lead by phone match.
      security: []
      parameters:
        - { name: password, in: query, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, example: "new-message" }
                data: { type: object }
      responses:
        "200":
          description: Acknowledged
        "401":
          description: Password mismatch

  /bb/history:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: Paginated inbound + outbound history (system-wide)
      parameters:
        - { name: page,  in: query, schema: { type: integer, default: 1, minimum: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 10, maximum: 100 } }
      responses:
        "200":
          description: History page
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  page: { type: integer }
                  total: { type: integer }
                  events:
                    type: array
                    items: { type: object }

  /bb/thread:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: Conversation thread for one lead
      parameters:
        - { name: lead_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Messages oldest→newest
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  messages:
                    type: array
                    items: { type: object }

  /bb/daily-stats:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: Today + 7-day outbound rollup (brand-bucketed)
      description: |
        Buckets outbound messages by date + brand (houseloop / placedagent / other),
        returns today's totals + 7-day rolling average, and the daily limit configured
        on the host.
      responses:
        "200":
          description: Daily stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:            { type: string, format: date }
                  total_outbound:  { type: integer }
                  unique_handles:  { type: array, items: { type: string } }
                  new_handles:     { type: array, items: { type: string } }
                  today:           { type: object }
                  week:            { type: array, items: { type: object } }
                  week_avg_unique: { type: number }
                  brand_breakdown: { type: object }
                  daily_limit:     { type: integer }

  /bb/settings:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: Get preferred send handle + available handles
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:               { type: boolean }
                  preferred_handle: { type: string, nullable: true }
                  available:        { type: array, items: { type: string } }
    post:
      tags: [iMessage (BlueBubbles)]
      summary: Set the preferred send handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handle]
              properties:
                handle: { type: string, description: "An identity from /bb/settings.available" }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── PHONE (Twilio) ──────────────────────────────────────────────────────────

  /phone/provider:
    get:
      tags: [Phone]
      summary: Twilio connection status (no secret leakage)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean }
                  connected:  { type: boolean }
                  account_sid_tail: { type: string, nullable: true }
    post:
      tags: [Phone]
      summary: Save + verify Twilio credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_sid, auth_token]
              properties:
                account_sid: { type: string }
                auth_token:  { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          description: Twilio rejected the credentials
    delete:
      tags: [Phone]
      summary: Remove stored Twilio credentials
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /phone/settings:
    get:
      tags: [Phone]
      summary: Current user's phone assignment + per-user settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:          { type: boolean }
                  number:      { type: string, nullable: true }
                  forward_to:  { type: string, nullable: true }
                  voicemail_enabled: { type: boolean }
    patch:
      tags: [Phone]
      summary: Update the current user's phone settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                forward_to:        { type: string, nullable: true }
                voicemail_enabled: { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /phone/dialers:
    get:
      tags: [Phone]
      summary: All users with their dialer assignment (admin view)
      responses:
        "200":
          description: Dialers
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  dialers:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:           { type: string, format: uuid }
                        full_name:         { type: string }
                        twilio_number:     { type: string, nullable: true }
                        is_default:        { type: boolean }
                        messaging_service: { type: string, nullable: true }
    post:
      tags: [Phone]
      summary: Assign a Twilio phone number to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, twilio_number]
              properties:
                user_id:           { type: string, format: uuid }
                twilio_number:     { type: string, description: "E.164 — must already exist on the Twilio account" }
                messaging_service: { type: string, nullable: true }
                is_default:        { type: boolean }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /phone/dialers/{id}:
    patch:
      tags: [Phone]
      summary: Update assignment config (messaging service / forwarding / default)
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messaging_service: { type: string, nullable: true }
                call_forward_to:   { type: string, nullable: true }
                is_default:        { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Phone]
      summary: Release the assignment (number stays on Twilio account)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /phone/dialers/{id}/configure-webhooks:
    post:
      tags: [Phone]
      summary: Wire Twilio webhooks for this dialer
      description: |
        Calls Twilio's number-update endpoint to set Voice URL + SMS URL to
        our `/phone/webhooks/voice` and `/phone/webhooks/sms` endpoints.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /phone/sms/send:
    post:
      tags: [Phone]
      summary: Send an SMS via the user's assigned Twilio number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, body]
              properties:
                to:      { type: string, description: "E.164" }
                body:    { type: string, maxLength: 1600 }
                lead_id: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:          { type: boolean }
                  message_sid: { type: string }

  /phone/webhooks/sms:
    post:
      tags: [Phone]
      summary: Twilio inbound SMS webhook
      description: Receives Twilio-form-encoded SMS payloads; writes inbound row + attributes by phone.
      security: []
      responses:
        "200":
          description: TwiML acknowledgement

  /phone/webhooks/voice:
    post:
      tags: [Phone]
      summary: Twilio inbound voice webhook
      description: |
        Receives Twilio voice webhooks; emits TwiML for forwarding or voicemail
        based on the assigned user's `forward_to` setting.
      security: []
      responses:
        "200":
          description: TwiML response

# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: hl_session

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Ok:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: true }

    OkId:
      description: Created / success with returned ID
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: true }
              id: { type: string, format: uuid }

    OkUser:
      description: Authenticated user
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean }
              user: { $ref: "#/components/schemas/User" }

    OkStage:
      description: Stage
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean }
              stage: { $ref: "#/components/schemas/Stage" }

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: false }
              error: { type: string, example: not_found }

    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: false }
              error: { type: string, example: unauthorized }

  schemas:

    Lead:
      type: object
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        source: { type: string }
        source_id: { type: string, format: uuid, nullable: true }
        stage_id: { type: string, format: uuid, nullable: true }
        stage_name: { type: string, nullable: true }
        stage_color: { type: string, nullable: true }
        pipeline_id: { type: string, format: uuid, nullable: true }
        assigned_user_id: { type: string, format: uuid, nullable: true }
        assigned_user_name: { type: string, nullable: true }
        lead_score: { type: integer }
        last_communication_at: { type: string, format: date-time, nullable: true }
        open_task_count: { type: integer }
        overdue_task_count: { type: integer }
        next_task_due_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    LeadSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }

    CreateLeadBody:
      type: object
      required: [first_name, last_name, email]
      properties:
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string, description: "Stored as digits-only; UI formats as (407) 403-8088" }
        stage_id:
          type: string
          format: uuid
          nullable: true
          description: "Omit to auto-assign position 0 of the default pipeline"
        source_id:
          type: string
          format: uuid
          nullable: true
          description: "FK to hl_lead_sources — sets the lead's origin (Indeed, Zillow, Referral, etc.)"
        assigned_user_id:
          type: string
          format: uuid
          nullable: true
          description: "FK to hl_users — initial owner. Leave null to keep the lead unassigned."
        note:
          type: string
          description: "If non-empty, also inserts a hl_notes row tied to the lead with source='lead_creation'"

    Stage:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer }
        color: { type: string, nullable: true }
        icon: { type: string }
        is_active: { type: boolean }
        is_terminal: { type: boolean }
        people: { type: integer, description: "Current leads in this stage" }
        days_avg: { type: number, nullable: true, description: "Average days leads spend here" }
        conversion: { type: number, nullable: true, description: "% that moved forward" }

    LeadSource:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        color: { type: string, nullable: true }
        source_type: { type: string }
        default_stage_id: { type: string, format: uuid, nullable: true }
        default_stage_name: { type: string, nullable: true }
        is_active: { type: boolean }
        total_leads: { type: integer }

    Tag:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string, nullable: true }
        lead_count: { type: integer }

    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        lead_id: { type: string, format: uuid }
        status: { type: string, enum: [open, done] }
        due_at: { type: string, format: date-time, nullable: true }
        assigned_user_id: { type: string, format: uuid, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    EmailTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string, nullable: true }
        category: { type: string, nullable: true }
        subject: { type: string, nullable: true }
        body: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    EmailCampaign:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type:
          type: string
          enum: [listing_alert, open_house, market_report, outreach_sequence, one_time_blast]
        status:
          type: string
          enum: [draft, scheduled, sending, sent, cancelled]
        list_id: { type: string, format: uuid, nullable: true }
        template_id: { type: string, format: uuid, nullable: true }
        subject: { type: string, nullable: true }
        scheduled_at: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    EmailCampaignDetail:
      allOf:
        - $ref: "#/components/schemas/EmailCampaign"
        - type: object
          properties:
            list_name: { type: string, nullable: true }
            list_member_count: { type: integer, nullable: true }
            template_name: { type: string, nullable: true }
            template_body: { type: string, nullable: true }
            template_subject: { type: string, nullable: true }
            template_category: { type: string, nullable: true }

    CreateCampaignBody:
      type: object
      required: [name]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [listing_alert, open_house, market_report, outreach_sequence, one_time_blast]
        status:
          type: string
          enum: [draft, scheduled, sending, sent, cancelled]
          default: draft
        list_id: { type: string, format: uuid, nullable: true }
        template_id: { type: string, format: uuid, nullable: true }
        subject: { type: string }
        notes: { type: string }
        scheduled_at: { type: string, format: date-time }

    TextTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        body: { type: string, description: "Supports {{first_name}}, {{last_name}}, {{agent_name}} merge tags" }
        category: { type: string, nullable: true }
        visibility: { type: string, enum: [public, private] }
        created_at: { type: string, format: date-time }

    CalendarEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        lead_id: { type: string, format: uuid, nullable: true }
        start_at: { type: string, format: date-time }
        end_at: { type: string, format: date-time }
        location: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        google_event_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    CreateCalendarEventBody:
      type: object
      required: [title, start_at, end_at]
      properties:
        title: { type: string }
        lead_id: { type: string, format: uuid, nullable: true }
        start_at: { type: string, format: date-time }
        end_at: { type: string, format: date-time }
        location: { type: string }
        notes: { type: string }

    SmartFilter:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        criteria:
          type: array
          items: { type: object }
        created_at: { type: string, format: date-time }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        full_name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, agent, viewer] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    SendingInbox:
      type: object
      description: |
        A configured org-level sending inbox (Gmail-connected). Used by
        campaigns + transactional sends. `purpose` segregates warming +
        deliverability — never use an `outreach` inbox for transactional mail.
      properties:
        id:        { type: string, format: uuid }
        email:     { type: string, format: email }
        label:     { type: string }
        purpose:   { type: string, enum: [outreach, nurture, transactional, alerts, marketing] }
        plan:      { type: string, description: "Instantly plan tag or 'native'" }
        connected: { type: boolean }
        warmup_active: { type: boolean }
        warmup_score:  { type: number, nullable: true }
        created_at: { type: string, format: date-time }
