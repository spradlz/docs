              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/User" }

    post:
      tags: [Team]
      summary: Invite a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, full_name, role]
              properties:
                email: { type: string, format: email }
                full_name: { type: string }
                role: { type: string, enum: [admin, agent, viewer] }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /team/users/{id}:
    get:
      tags: [Team]
      summary: Get a team member
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                type: object
