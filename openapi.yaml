  # ── OPTIONS (LOOKUP DATA) ───────────────────────────────────────────────────

  /options:
    get:
      tags: [Options]
      summary: Get all lookup data for filter dropdowns
      description: |
        Returns stages, lead sources, tags, and users in one call.
        Use this to populate filter panel dropdowns without making 4 separate requests.
      responses:
        "200":
          description: Lookup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  stages:
                    type: array
                    items: { $ref: "#/components/schemas/Stage" }
                  sources:
                    type: array
                    items: { $ref: "#/components/schemas/LeadSource" }
                  tags:
                    type: array
                    items: { $ref: "#/components/schemas/Tag" }
                  users:
                    type: array
                    items: { $ref: "#/components/schemas/User" }

  # ── AUTH (additional endpoints) ─────────────────────────────────────────────

  /auth/google:
    get:
      tags: [Auth]
      summary: Start Google sign-in (302 redirect)
      description: |
        Generates a Google OAuth URL with `openid email profile` scopes and
        302-redirects the browser. Set `next` cookie before redirecting to
        return the user to their original page after `/auth/google/callback`.
      responses:
        "302":
          description: Redirect to Google consent screen

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback (exchange code → session)
      description: |
        Google redirects here after consent. Exchanges `code` for tokens,
        verifies the email is in `hl_users`, mints a session cookie, and
        302-redirects to the `next` URL (or `/dashboard` if none).
      parameters:
        - { name: code,  in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
      responses:
        "302":
          description: Redirect after sign-in (success or `?auth=denied` on error)

  /auth/sso:
    get:
      tags: [Auth]
      summary: Short-lived SSO token redemption
      description: |
        Used by Lee's SSO bridge — accepts a one-time `t` token from the
        identity service, swaps it for a session cookie, redirects to `/dashboard`.
      parameters:
        - { name: t, in: query, required: true, schema: { type: string } }
      responses:
        "302":
          description: Redirect with session cookie set
        "401":
          description: Invalid or expired token

  /auth/setup:
    get:
      tags: [Auth]
      summary: Detect first-run state
      description: "Returns `{ needs_setup: true }` when `hl_users` is empty."
      responses:
        "200":
          description: Setup state
          content:
            application/json:
              schema:
                type: object
                properties:
                  needs_setup: { type: boolean }
    post:
      tags: [Auth]
      summary: Create the first admin user
      description: |
        Only succeeds when `hl_users` is empty. Creates an admin user from the
        provided email + password and mints their session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, full_name]
              properties:
                email:     { type: string, format: email }
                password:  { type: string, format: password }
                full_name: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "409":
          description: Setup already complete (users exist)

  /auth/emulate:
    delete:
      tags: [Auth]
      summary: Exit emulation mode
      description: |
        Clears the emulation overlay cookie and restores the underlying
        admin session. Pairs with `POST /team/users/{id}/emulate`.
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── PROFILE ─────────────────────────────────────────────────────────────────

  /profile:
    get:
      tags: [Profile]
      summary: Get current user's full profile row
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  user: { $ref: "#/components/schemas/User" }
    patch:
      tags: [Profile]
      summary: Update editable profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:        { type: string }
                avatar_url:       { type: string, nullable: true }
                phone:            { type: string, nullable: true }
                signature_html:   { type: string, nullable: true }
                timezone:         { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── NOTIFICATIONS ───────────────────────────────────────────────────────────

  /notification-channels:
    get:
      tags: [Notifications]
      summary: List configured notification channels
      description: Channels = Email + SMS + Push + Telegram + Slack with per-channel enabled flag.
      responses:
        "200":
          description: Channels
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  channels:
                    type: array
                    items:
                      type: object
                      properties:
                        kind:    { type: string, example: "email" }
                        target:  { type: string, nullable: true }
                        enabled: { type: boolean }
    put:
      tags: [Notifications]
      summary: Replace the full channels array
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channels:
                  type: array
                  items: { type: object }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /notification-preferences:
    get:
      tags: [Notifications]
      summary: Get the current user's per-event notification preferences
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  preferences: { type: object }
    put:
      tags: [Notifications]
      summary: Save the current user's notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                preferences: { type: object }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── TEAM (additional) ───────────────────────────────────────────────────────

  /team/users/{id}/emulate:
    post:
      tags: [Team]
      summary: Start emulating another user (admin only)
      description: |
        Sets an emulation overlay cookie that makes subsequent requests appear
        to come from `{id}`. The underlying admin session is preserved.
        End emulation with `DELETE /auth/emulate`.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          description: Caller is not an admin

  # ── TASKS (additional) ──────────────────────────────────────────────────────

  /tasks/bulk:
    post:
      tags: [Tasks]
      summary: Bulk complete / dismiss / delete tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [task_ids, action]
              properties:
                task_ids:
                  type: array
                  items: { type: string, format: uuid }
                action:
                  type: string
                  enum: [complete, dismiss, delete]
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── SYSTEM ──────────────────────────────────────────────────────────────────

  /db-health:
    get:
      tags: [System]
      summary: Database health check
      description: |
        Returns `{ ok: true, db: 'reachable' }` when the Postgres pool can
        execute `SELECT 1`. Used by Railway + uptime monitors.
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  db: { type: string }
        "503":
          description: DB unreachable

  # ── EMAIL INTEGRATION ───────────────────────────────────────────────────────

  /email/auth/connect:
    get:
      tags: [Email Integration]
      summary: Start Gmail OAuth (302 redirect)
      description: |
        Generates a Google OAuth URL with Gmail send + signature scopes.
        `inbox_id` ties the resulting tokens to a specific
        `hl_sending_inboxes` row (set when connecting an org inbox);
        `login_hint` pre-fills the Google account email.
      parameters:
        - { name: inbox_id,   in: query, schema: { type: string, format: uuid } }
        - { name: login_hint, in: query, schema: { type: string, format: email } }
      responses:
        "302":
          description: Redirect to Google consent

  /email/auth/callback:
    get:
      tags: [Email Integration]
      summary: Gmail OAuth callback (exchange code → tokens)
      description: |
        Google redirects here after Gmail consent. Stores refresh + access
        tokens on the user's row (or the inbox row when `state.inbox_id` is set)
        and redirects to `/settings/email?status=connected`.
      parameters:
        - { name: code,  in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
      responses:
        "302":
          description: Redirect after Gmail connect

  /email/status:
    get:
      tags: [Email Integration]
      summary: Connection status for the current user (or a specific inbox)
      parameters:
        - { name: inbox_id, in: query, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean }
                  connected:  { type: boolean }
                  email:      { type: string, nullable: true }
                  expires_at: { type: string, format: date-time, nullable: true }

  /email/disconnect:
    delete:
      tags: [Email Integration]
      summary: Revoke Gmail token + clear connection state
      parameters:
        - { name: inbox_id, in: query, schema: { type: string, format: uuid } }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/send:
    post:
      tags: [Email Integration]
      summary: Send a one-off email via the user's connected Gmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, body_html]
              properties:
                lead_id:   { type: string, format: uuid, nullable: true }
                to:        { type: string, format: email }
                cc:        { type: array, items: { type: string, format: email } }
                bcc:       { type: array, items: { type: string, format: email } }
                subject:   { type: string }
                body_html: { type: string }
                from_inbox_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: "Override the default sender — pass a hl_sending_inboxes row id"
      responses:
        "200":
          description: Sent (Gmail message id returned)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean }
                  message_id: { type: string }

  /email/senders:
    get:
      tags: [Email Integration]
      summary: List eligible senders for a campaign
      description: |
        Returns the set of `hl_sending_inboxes` rows that are warmed-up
        + authorized for the given `campaign_type`. The campaign editor
        feeds this into the "Send From" dropdown.
      parameters:
        - { name: campaign_type, in: query, required: true, schema: { type: string, enum: [outreach, nurture, transactional, alerts, marketing] } }
      responses:
        "200":
          description: Eligible senders
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  senders:
                    type: array
                    items:
                      type: object
                      properties:
                        id:    { type: string, format: uuid }
                        email: { type: string, format: email }
                        label: { type: string }
                        warmed_up: { type: boolean }

  /email/settings:
    patch:
      tags: [Email Integration]
      summary: Update per-user sync + domain-filter preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sync_enabled:        { type: boolean }
                domain_filter:       { type: array, items: { type: string } }
                inbound_to_inbox:    { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/signature:
    get:
      tags: [Email Integration]
      summary: Fetch saved signature for the connected Gmail account
      parameters:
        - { name: inbox_id, in: query, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Signature
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:        { type: boolean }
                  signature: { type: string, nullable: true }
    post:
      tags: [Email Integration]
      summary: Save / update the signature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signature]
              properties:
                signature: { type: string }
                inbox_id:  { type: string, format: uuid, nullable: true }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/signature/import:
    post:
      tags: [Email Integration]
      summary: Pull the user's existing Gmail signature via the Gmail API
      description: |
        Reads the `sendAs` resource from Gmail Users API and copies the HTML
        into `hl_users.signature_html`. Idempotent — call again to refresh.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                inbox_id: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: Imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:        { type: boolean }
                  signature: { type: string }

  /email/compliance:
    get:
      tags: [Email Integration]
      summary: Read CAN-SPAM compliance config (footer, address, etc.)
      responses:
        "200":
          description: Config
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:                 { type: boolean }
                  business_name:      { type: string }
                  business_address:   { type: string }
                  unsubscribe_url:    { type: string, format: uri }
                  footer_html:        { type: string }
    patch:
      tags: [Email Integration]
      summary: Update compliance config
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                business_name:    { type: string }
                business_address: { type: string }
                unsubscribe_url:  { type: string, format: uri }
                footer_html:      { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/team:
    get:
      tags: [Email Integration]
      summary: Per-user email connection status across the team
      description: |
        Returns each `hl_users` row with their Gmail connection state, last
        sync time, and inbox assignment — drives the Team Email settings table.
      responses:
        "200":
          description: Team email roster
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  team:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:    { type: string, format: uuid }
                        full_name:  { type: string }
                        email:      { type: string, format: email }
                        connected:  { type: boolean }
                        last_sync:  { type: string, format: date-time, nullable: true }

  /email/warmup-status:
    get:
      tags: [Email Integration]
      summary: Live warmup health for all sending inboxes (via Instantly.ai)
      description: |
        Fans out to Instantly's API and returns aggregated warmup score,
        sent count, replied count, spam count per inbox.
      responses:
        "200":
          description: Warmup snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  inboxes:
                    type: array
                    items:
                      type: object
                      properties:
                        inbox_id:    { type: string, format: uuid }
                        email:       { type: string, format: email }
                        warmup_score: { type: number }
                        sent:         { type: integer }
                        replied:      { type: integer }
                        spam:         { type: integer }

  # ── EMAIL INFRASTRUCTURE ────────────────────────────────────────────────────

  /email/infrastructure/inboxes:
    get:
      tags: [Email Infrastructure]
      summary: List all org sending inboxes with OAuth status
      responses:
        "200":
          description: Inboxes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  inboxes:
                    type: array
                    items: { $ref: "#/components/schemas/SendingInbox" }
    post:
      tags: [Email Infrastructure]
      summary: Add a new sending inbox (no OAuth yet — connect via /email/auth/connect)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, label, purpose]
              properties:
                email:   { type: string, format: email }
                label:   { type: string, example: "Outreach inbox 1" }
                purpose:
                  type: string
                  enum: [outreach, nurture, transactional, alerts, marketing]
                plan:
                  type: string
                  description: "Instantly plan tag (free/growth/scale) or 'native' for non-Instantly inboxes"
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /email/infrastructure/inboxes/{id}:
    patch:
      tags: [Email Infrastructure]
      summary: Update inbox label / purpose / plan
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:   { type: string }
                purpose:
                  type: string
                  enum: [outreach, nurture, transactional, alerts, marketing]
                plan:    { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Email Infrastructure]
      summary: Remove an inbox (custom inboxes only — system inboxes are protected)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "403":
          description: Refusal — inbox is system-managed

  /email/infrastructure/instantly:
    get:
      tags: [Email Infrastructure]
      summary: Instantly.ai connection status (key fingerprint only — never the full key)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:        { type: boolean }
                  connected: { type: boolean }
                  fingerprint: { type: string, nullable: true }
    post:
      tags: [Email Infrastructure]
      summary: Store + verify Instantly API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          description: Key rejected by Instantly
    delete:
      tags: [Email Infrastructure]
      summary: Remove stored Instantly config
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/infrastructure/resend:
    get:
      tags: [Email Infrastructure]
      summary: Resend connection status
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:        { type: boolean }
                  connected: { type: boolean }
    post:
      tags: [Email Infrastructure]
      summary: Store + verify Resend API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [api_key]
              properties:
                api_key: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Email Infrastructure]
      summary: Remove stored Resend config
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── EMAIL LISTS ─────────────────────────

  /email/lists:
    get:
      tags: [Email Lists]
      summary: List static + smart lists
      parameters:
        - { name: type,  in: query, schema: { type: string, enum: [static, smart] } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
      responses:
        "200":
          description: Lists
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  lists:
                    type: array
                    items:
                      type: object
                      properties:
                        id:    { type: string, format: uuid }
                        name:  { type: string }
                        type:  { type: string, enum: [static, smart] }
                        size:  { type: integer }
    post:
      tags: [Email Lists]
      summary: Create a static or smart list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name: { type: string }
                type: { type: string, enum: [static, smart] }
                criteria:
                  type: array
                  description: "FilterCondition[] for smart lists; omitted for static"
                  items: { type: object }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /email/lists/{id}:
    get:
      tags: [Email Lists]
      summary: Get a list with its criteria + member count
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: List
    patch:
      tags: [Email Lists]
      summary: Rename or rewrite criteria
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:     { type: string }
                criteria: { type: array, items: { type: object } }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Email Lists]
      summary: Delete a list (drops `hl_email_list_members` rows)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /email/lists/{id}/members:
    get:
      tags: [Email Lists]
      summary: List current members (static lists) or resolved leads (smart)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  leads:
                    type: array
                    items: { $ref: "#/components/schemas/Lead" }
    post:
      tags: [Email Lists]
      summary: Add lead IDs to a static list
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lead_ids]
              properties:
                lead_ids:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Email Lists]
      summary: Remove a single lead from a static list
      parameters:
        - $ref: "#/components/parameters/Id"
        - { name: lead_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  # ── CALENDAR INTEGRATION ────────────────────────────────────────────────────

  /calendar/auth/connect:
    get:
      tags: [Calendar Integration]
      summary: Start Google Calendar OAuth (302 redirect)
      description: |
        Generates a Google OAuth URL with calendar scopes.
        Agents connect their PERSONAL Google account (no `hd` restriction).
        Uses `x-forwarded-host` + `x-forwarded-proto` to derive redirect_uri
        (Railway terminates SSL internally — `req.nextUrl.origin` is unreliable).
      responses:
        "302":
          description: Redirect to Google consent

  /calendar/auth/callback:
    get:
      tags: [Calendar Integration]
      summary: Google Calendar OAuth callback
      description: |
        Exchanges code for tokens, fetches the Google account email,
        upserts `hl_calendar_connections` for the CRM user, redirects to
        `/settings/calendar`.
      parameters:
        - { name: code,  in: query, schema: { type: string } }
        - { name: state, in: query, schema: { type: string } }
        - { name: error, in: query, schema: { type: string } }
      responses:
        "302":
          description: Redirect after connect

  /calendar/settings:
    get:
      tags: [Calendar Integration]
      summary: Connection state + Google calendar list (for import/export pickers)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:               { type: boolean }
                  connected:        { type: boolean }
                  account_email:    { type: string, nullable: true }
                  import_calendar:  { type: string, nullable: true }
                  export_calendar:  { type: string, nullable: true }
                  sync_enabled:     { type: boolean }
                  calendars:
                    type: array
                    items:
                      type: object
                      properties:
                        id:      { type: string }
                        summary: { type: string }
                        primary: { type: boolean }
    patch:
      tags: [Calendar Integration]
      summary: Update import/export calendar selection + sync toggle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                import_calendar_id: { type: string, nullable: true }
                export_calendar_id: { type: string, nullable: true }
                import_enabled:     { type: boolean }
                export_enabled:     { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Calendar Integration]
      summary: Disconnect — drops the connection row + clears event linkage
      description: |
        ON DELETE CASCADE drops `hl_calendar_events`. Sets `calendar_event_id`
        and `calendar_provider` to NULL on appointments that were synced
        to Google (the appointments themselves stay).
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /calendar/sync:
    post:
      tags: [Calendar Integration]
      summary: Trigger an incremental import from Google Calendar
      description: |
        Pulls events using `nextSyncToken`. Falls back to a full sync if the
        token expires (HTTP 410). Full sync covers -30 to +60 days.
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:           { type: boolean }
                  imported:     { type: integer }
                  updated:      { type: integer }
                  deleted:      { type: integer }
                  full_sync:    { type: boolean }

  # ── iMESSAGE (BlueBubbles) ──────────────────────────────────────────────────

  /bluebubbles:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: BlueBubbles server health + webhook list
      description: |
        Hits the BlueBubbles bridge on Camp David (`BB_URL`) and returns
        connection state, message + attachment totals, and registered webhooks.
      responses:
        "200":
          description: BlueBubbles health
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:                { type: boolean }
                  connected:         { type: boolean }
                  server_url:        { type: string }
                  message_count:     { type: integer, nullable: true }
                  attachment_count:  { type: integer, nullable: true }
                  webhooks:
                    type: array
                    items: { type: object }

  /bb/send:
    post:
      tags: [iMessage (BlueBubbles)]
      summary: Send an iMessage via BlueBubbles
      description: |
        Forwards to `${BB_URL}/api/v1/message/text`. `from_handle` selects the
        sending identity when multiple iMessage handles are configured on the host.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, message]
              properties:
                to:          { type: string, description: "iMessage address — phone (E.164) or apple id email" }
                message:     { type: string }
                lead_id:     { type: string, format: uuid, nullable: true, description: "Link the send to a lead (writes hl_bb_events row)" }
                from_handle: { type: string, nullable: true, description: "Sender handle override; defaults to bb/settings preferred handle" }
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:   { type: boolean }
                  guid: { type: string }
        "400":
          description: Missing required fields
        "502":
          description: BlueBubbles unreachable

  /bb/inbound:
    post:
      tags: [iMessage (BlueBubbles)]
      summary: BlueBubbles webhook — inbound iMessage delivery
      description: |
        BlueBubbles posts here for `new-message` and `updated-message` events.
        Inserts/updates `hl_bb_events`. Bearer auth via `?password=` query (set
        when registering the webhook). Inbound is dual-routed to PA + HouseLoop —
        the handler attributes per-lead by phone match.
      security: []
      parameters:
        - { name: password, in: query, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, example: "new-message" }
                data: { type: object }
      responses:
        "200":
          description: Acknowledged
        "401":
          description: Password mismatch

  /bb/history:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: Paginated inbound + outbound history (system-wide)
      parameters:
        - { name: page,  in: query, schema: { type: integer, default: 1, minimum: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 50, minimum: 10, maximum: 100 } }
      responses:
        "200":
          description: History page
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  page: { type: integer }
                  total: { type: integer }
                  events:
                    type: array
                    items: { type: object }

  /bb/thread:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: Conversation thread for one lead
      parameters:
        - { name: lead_id, in: query, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Messages oldest→newest
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  messages:
                    type: array
                    items: { type: object }

  /bb/daily-stats:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: Today + 7-day outbound rollup (brand-bucketed)
      description: |
        Buckets outbound messages by date + brand (houseloop / placedagent / other),
        returns today's totals + 7-day rolling average, and the daily limit configured
        on the host.
      responses:
        "200":
          description: Daily stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  date:            { type: string, format: date }
                  total_outbound:  { type: integer }
                  unique_handles:  { type: array, items: { type: string } }
                  new_handles:     { type: array, items: { type: string } }
                  today:           { type: object }
                  week:            { type: array, items: { type: object } }
                  week_avg_unique: { type: number }
                  brand_breakdown: { type: object }
                  daily_limit:     { type: integer }

  /bb/settings:
    get:
      tags: [iMessage (BlueBubbles)]
      summary: Get preferred send handle + available handles
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:               { type: boolean }
                  preferred_handle: { type: string, nullable: true }
                  available:        { type: array, items: { type: string } }
    post:
      tags: [iMessage (BlueBubbles)]
      summary: Set the preferred send handle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [handle]
              properties:
                handle: { type: string, description: "An identity from /bb/settings.available" }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /bb/typing:
    post:
      tags: [iMessage (BlueBubbles)]
      summary: Show/clear the typing indicator on the lead's iPhone
      description: |
        Forwards to the BlueBubbles Private API at
        `POST /api/v1/chat/{chat_guid}/typing` with `method: 'private-api'`.
        Lead sees three iOS-style dots while `display=true` is held. Best-effort —
        BB occasionally drops stop events; the client also auto-clears after 5s.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [chat_guid, display]
              properties:
                chat_guid: { type: string, example: "iMessage;-;+14074038088" }
                display:   { type: boolean }
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { description: Unauthorized }
        "502": { description: BlueBubbles unreachable or rejected the request }
        "503": { description: BlueBubbles not configured }

  # ── PHONE (Twilio) ──────────────────────────────────────────────────────────

  /phone/provider:
    get:
      tags: [Phone]
      summary: Twilio connection status (no secret leakage)
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:         { type: boolean }
                  connected:  { type: boolean }
                  account_sid_tail: { type: string, nullable: true }
    post:
      tags: [Phone]
      summary: Save + verify Twilio credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [account_sid, auth_token]
              properties:
                account_sid: { type: string }
                auth_token:  { type: string }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          description: Twilio rejected the credentials
    delete:
      tags: [Phone]
      summary: Remove stored Twilio credentials
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /phone/settings:
    get:
      tags: [Phone]
      summary: Current user's phone assignment + per-user settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:          { type: boolean }
                  number:      { type: string, nullable: true }
                  forward_to:  { type: string, nullable: true }
                  voicemail_enabled: { type: boolean }
    patch:
      tags: [Phone]
      summary: Update the current user's phone settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                forward_to:        { type: string, nullable: true }
                voicemail_enabled: { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /phone/dialers:
    get:
      tags: [Phone]
      summary: All users with their dialer assignment (admin view)
      responses:
        "200":
          description: Dialers
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  dialers:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:           { type: string, format: uuid }
                        full_name:         { type: string }
                        twilio_number:     { type: string, nullable: true }
                        is_default:        { type: boolean }
                        messaging_service: { type: string, nullable: true }
    post:
      tags: [Phone]
      summary: Assign a Twilio phone number to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, twilio_number]
              properties:
                user_id:           { type: string, format: uuid }
                twilio_number:     { type: string, description: "E.164 — must already exist on the Twilio account" }
                messaging_service: { type: string, nullable: true }
                is_default:        { type: boolean }
      responses:
        "201":
          $ref: "#/components/responses/OkId"

  /phone/dialers/{id}:
    patch:
      tags: [Phone]
      summary: Update assignment config (messaging service / forwarding / default)
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messaging_service: { type: string, nullable: true }
                call_forward_to:   { type: string, nullable: true }
                is_default:        { type: boolean }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
    delete:
      tags: [Phone]
      summary: Release the assignment (number stays on Twilio account)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /phone/dialers/{id}/configure-webhooks:
    post:
      tags: [Phone]
      summary: Wire Twilio webhooks for this dialer
      description: |
        Calls Twilio's number-update endpoint to set Voice URL + SMS URL to
        our `/phone/webhooks/voice` and `/phone/webhooks/sms` endpoints.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /phone/sms/send:
    post:
      tags: [Phone]
      summary: Send an SMS via the user's assigned Twilio number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, body]
              properties:
                to:      { type: string, description: "E.164" }
                body:    { type: string, maxLength: 1600 }
                lead_id: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:          { type: boolean }
                  message_sid: { type: string }

  /phone/webhooks/sms:
    post:
      tags: [Phone]
      summary: Twilio inbound SMS webhook
      description: Receives Twilio-form-encoded SMS payloads; writes inbound row + attributes by phone.
      security: []
      responses:
        "200":
          description: TwiML acknowledgement

  /phone/webhooks/voice:
    post:
      tags: [Phone]
      summary: Twilio inbound voice webhook
      description: |
        Receives Twilio voice webhooks; emits TwiML for forwarding or voicemail
        based on the assigned user's `forward_to` setting.
      security: []
      responses:
        "200":
          description: TwiML response


  # ── APPOINTMENTS (outcomes, rules, types) ───────────────────────────────────

  /appointment-outcomes:
    get:
      tags: [Appointments]
      summary: List appointment outcomes (active, or all when scope=admin)
      parameters:
        - name: scope
          in: query
          required: false
          schema: { type: string, enum: [admin] }
          description: "admin → all rows with in_use_count + rules_count; default → active only"
      responses:
        "200":
          description: Outcomes
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  outcomes:
                    type: array
                    items: { type: object }
    post:
      tags: [Appointments]
      summary: Create an appointment outcome
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label]
              properties:
                label: { type: string, maxLength: 60 }
                color: { type: string }
                icon: { type: string, nullable: true }
                valid_for_types:
                  type: array
                  items: { type: string }
                  nullable: true
                stage_advance_to_stage_id: { type: string, format: uuid, nullable: true }
                is_default: { type: boolean }
                is_active: { type: boolean }
      responses:
        "201":
          description: Created outcome
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  outcome: { type: object }
    patch:
      tags: [Appointments]
      summary: Bulk reorder appointment outcomes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items:
                    type: object
                    required: [id, sort_order]
                    properties:
                      id: { type: string, format: uuid }
                      sort_order: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /appointment-outcomes/{id}:
    patch:
      tags: [Appointments]
      summary: Update an appointment outcome
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string, maxLength: 60 }
                color: { type: string, nullable: true }
                icon: { type: string, nullable: true }
                valid_for_types:
                  type: array
                  items: { type: string }
                  nullable: true
                stage_advance_to_stage_id: { type: string, format: uuid, nullable: true }
                is_active: { type: boolean }
                is_default: { type: boolean }
      responses:
        "200":
          description: Updated outcome
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  outcome: { type: object }
        "404":
          description: Not found
    delete:
      tags: [Appointments]
      summary: Delete an appointment outcome (409 if in use)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          description: Not found
        "409":
          description: Outcome is in use; deactivate instead

  /appointment-outcomes/{id}/rules:
    get:
      tags: [Appointments]
      summary: List stage-advance rules for an outcome (ordered, first-match-wins)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  rules:
                    type: array
                    items: { type: object }
    post:
      tags: [Appointments]
      summary: Create a stage-advance rule for an outcome
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_stage_id]
              properties:
                match_appt_type_key: { type: string, nullable: true }
                match_current_stage_id: { type: string, format: uuid, nullable: true }
                target_stage_id: { type: string, format: uuid }
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  rule: { type: object }
    patch:
      tags: [Appointments]
      summary: Bulk reorder rules for an outcome
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items:
                    type: object
                    required: [id, sort_order]
                    properties:
                      id: { type: string, format: uuid }
                      sort_order: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /appointment-outcomes/{id}/rules/{ruleId}:
    patch:
      tags: [Appointments]
      summary: Update one stage-advance rule
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: ruleId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                match_appt_type_key: { type: string, nullable: true }
                match_current_stage_id: { type: string, format: uuid, nullable: true }
                target_stage_id: { type: string, format: uuid }
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  rule: { type: object }
        "404":
          description: Not found
    delete:
      tags: [Appointments]
      summary: Delete one stage-advance rule
      parameters:
        - $ref: "#/components/parameters/Id"
        - name: ruleId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          $ref: "#/components/responses/Ok"

  /appointment-types/{id}:
    patch:
      tags: [Appointments]
      summary: Update an appointment type (system rows allow only color/icon)
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string, maxLength: 60 }
                color: { type: string, nullable: true }
                icon: { type: string, nullable: true }
                default_duration_minutes: { type: integer, nullable: true }
                stage_advance_to_stage_id: { type: string, format: uuid, nullable: true }
                is_active: { type: boolean }
      responses:
        "200":
          description: Updated type
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  type: { type: object }
        "404":
          description: Not found
    delete:
      tags: [Appointments]
      summary: Delete an appointment type (409 if system or in use)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "404":
          description: Not found
        "409":
          description: System-protected or in use; deactivate instead

  # ── EMAIL INFRASTRUCTURE (instantly sync) ───────────────────────────────────

  /email/infrastructure/instantly/sync:
    post:
      tags: [Email Infrastructure]
      summary: Sync sending inboxes from the Instantly account list
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  synced: {}
        "400":
          description: Instantly not configured
        "502":
          description: Instantly API error

  # ── INNGEST (server-to-server function serving) ─────────────────────────────

  /inngest:
    get:
      tags: [System]
      summary: Inngest serve endpoint (introspection)
      description: Server-to-server function-serving endpoint for Inngest (app id houseloop-crm). Not for direct client use.
      responses:
        "200":
          description: Inngest function metadata
    post:
      tags: [System]
      summary: Inngest serve endpoint (function invocation)
      description: Inngest calls back into this URL to execute registered functions.
      responses:
        "200":
          description: Function run accepted
    put:
      tags: [System]
      summary: Inngest serve endpoint (function registration)
      description: Inngest function registration / sync handshake.
      responses:
        "200":
          description: Registration acknowledged

  # ── WEBSITE INTEGRATION ──────────────────────────────────────────────────────

  /integrations/website/lead-intake:
    post:
      tags: [Website Integration]
      summary: Inbound website lead capture (per-source API token)
      description: "Auth via x-houseloop-intake-secret header (SHA-256 hashed, matched to a lead source). UPSERTs hl_leads by email and appends a touchpoint."
      parameters:
        - name: x-houseloop-intake-secret
          in: header
          required: true
          schema: { type: string }
          description: Per-source plaintext API token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                firstName: { type: string }
                lastName: { type: string }
                phone: { type: string }
                action: { type: string, description: "e.g. google_signin, saved_home, showing_request" }
      responses:
        "200":
          description: Lead upserted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  lead_id: { type: string, format: uuid }
                  created: { type: boolean }
        "400":
          description: Invalid JSON or missing/invalid email
        "401":
          description: Missing, unknown, or inactive token

  /integrations/website/registration-settings:
    get:
      tags: [Website Integration]
      summary: Get public-site registration/gating settings (falls back to defaults)
      responses:
        "200":
          description: Registration settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ppc_min_detail_views_for_registration: { type: integer }
                  ppc_photo_gating_enabled: { type: boolean }
                  social_phone_requirement: { type: string, enum: [required, optional, hidden] }
                  phone_required_on_showing_request: { type: boolean }
                  international_phone_allowed: { type: boolean }
                  denote_required_fields: { type: boolean }
    put:
      tags: [Website Integration]
      summary: Patch registration/gating settings (whitelisted keys only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ppc_min_detail_views_for_registration: { type: integer, minimum: 0 }
                ppc_photo_gating_enabled: { type: boolean }
                social_phone_requirement: { type: string, enum: [required, optional, hidden] }
                phone_required_on_showing_request: { type: boolean }
                international_phone_allowed: { type: boolean }
                denote_required_fields: { type: boolean }
      responses:
        "200":
          description: Merged settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  settings: { type: object }
        "400":
          description: Invalid JSON

  # ── LEAD SOURCES (intake token) ──────────────────────────────────────────────

  /lead-sources/{id}/api-token:
    post:
      tags: [Lead Sources]
      summary: Generate (rotate) a lead source intake API token
      description: Returns the plaintext token EXACTLY ONCE; only the SHA-256 hash + last4 are persisted. Regenerating invalidates the previous token. For the houseloop.ai source, the token is also pushed to the houseloop-web Railway service.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Newly issued token (shown once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  token: { type: string }
                  last4: { type: string }
                  source_name: { type: string }
                  source_key: { type: string }
                  pushed_to_railway:
                    type: object
                    properties:
                      attempted: { type: boolean }
                      ok: { type: boolean }
                      error: { type: string }
        "400":
          description: Missing id
        "404":
          description: Source not found

  # ── LEADS (single metrics row) ───────────────────────────────────────────────

  /leads/{id}/metrics:
    get:
      tags: [Leads]
      summary: Get a single lead's aggregate metric row (same shape as the leads list)
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Lead row
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  lead: { type: object }
        "401":
          description: Unauthorized
        "404":
          description: Lead not found

  # ── NOTIFICATIONS ────────────────────────────────────────────────────────────

  /notifications:
    get:
      tags: [Notifications]
      summary: List the current user's notifications (newest first) + unread count
      parameters:
        - name: filter
          in: query
          required: false
          schema: { type: string, enum: [all, unread] }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 30 }
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  items:
                    type: array
                    items: { type: object }
                  unread: { type: integer }
        "401":
          description: Unauthorized

  /notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark one notification read
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          description: Unauthorized

  /notifications/lead-badges:
    get:
      tags: [Notifications]
      summary: Get per-lead unread notification counts by category
      parameters:
        - name: lead_id
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Category counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  requests: { type: integer }
                  homes: { type: integer }
                  texts: { type: integer }
        "400":
          description: lead_id required
        "401":
          description: Unauthorized
    post:
      tags: [Notifications]
      summary: Mark a lead's notifications read (clear the badge)
      description: |
        Clears unread notifications for a lead so the leads-table mission-control
        badges go away. `category: 'all'` clears every unread notification for the
        lead (used by clear-on-open + the row Clear action); a specific category
        clears just that group.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lead_id, category]
              properties:
                lead_id: { type: string, format: uuid }
                category: { type: string, enum: [all, requests, homes, texts] }
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "400":
          description: lead_id and valid category required
        "401":
          description: Unauthorized

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all of the current user's notifications read
      responses:
        "200":
          $ref: "#/components/responses/Ok"
        "401":
          description: Unauthorized

  /notifications/stream:
    get:
      tags: [Notifications]
      summary: Server-Sent Events stream of notifications for the current user
      description: Long-lived text/event-stream. Emits a `ready` event on connect, then one frame per new notification, with periodic heartbeat comments.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }
        "401":
          description: Unauthorized

  /notifications/unread-count:
    get:
      tags: [Notifications]
      summary: Cheap unread notification count for the bell badge
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  unread: { type: integer }
        "401":
          description: Unauthorized

  # ── PIXEL (first-party behavioral tracking) ──────────────────────────────────

  /pixel/events:
    get:
      tags: [Pixel]
      summary: List a lead's first-party behavioral events + per-MLS view counts
      parameters:
        - name: lead_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 200, maximum: 500 }
      responses:
        "200":
          description: Events and view counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  events:
                    type: array
                    items: { type: object }
                  view_counts:
                    type: object
                    additionalProperties: { type: integer }
        "400":
          description: lead_id required

  /pixel/stats:
    get:
      tags: [Pixel]
      summary: Global first-party pixel health (event/visitor counts + recent activity)
      responses:
        "200":
          description: Pixel stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  events_today: { type: integer }
                  events_week: { type: integer }
                  visitors_week: { type: integer }
                  identified_leads: { type: integer }
                  recent:
                    type: array
                    items: { type: object }

  /pixel/track:
    post:
      tags: [Pixel]
      summary: Public first-party pixel ingest (anonymous browser events)
      description: "Public, unauthenticated, CORS-gated endpoint. The hl-pixel on houseloop.ai POSTs visitor events; stitches anonymous visitors to leads by email. event_type 'identify' stitches identity without logging an event."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [visitor_id, event_type]
              properties:
                visitor_id: { type: string }
                event_type: { type: string }
                email: { type: string, format: email, nullable: true }
                mls_number: { type: string, nullable: true }
                property: { type: object, nullable: true }
                payload: { type: object, nullable: true }
                occurred_at: { type: string, format: date-time, nullable: true }
      responses:
        "200":
          description: Ingest result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  identified: { type: boolean }
        "400":
          description: Invalid JSON or missing visitor_id/event_type
    options:
      tags: [Pixel]
      summary: CORS preflight for the public pixel endpoint
      responses:
        "204":
          description: CORS headers

  # ── SCHEDULED ACTIONS ────────────────────────────────────────────────────────

  /scheduled-actions:
    get:
      tags: [Scheduled Actions]
      summary: List scheduled actions (by lead, or global by scope)
      description: Auth via CRM session cookie or x-hl-internal-secret header.
      parameters:
        - name: lead_id
          in: query
          required: false
          schema: { type: string, format: uuid }
        - name: scope
          in: query
          required: false
          schema: { type: string, enum: [pending, history, all] }
          description: Used for the global list when lead_id is omitted
      responses:
        "200":
          description: Scheduled actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  actions:
                    type: array
                    items: { type: object }
        "401":
          description: Unauthorized
    post:
      tags: [Scheduled Actions]
      summary: Create a scheduled action
      description: Auth via CRM session cookie (actor_type user) or x-hl-internal-secret header (actor_type myli).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lead_id, action_type, payload, scheduled_for]
              properties:
                lead_id: { type: string, format: uuid }
                action_type: { type: string, enum: [text, email, internal] }
                channel: { type: string, nullable: true }
                payload: { type: object }
                scheduled_for: { type: string, format: date-time }
                actor_type: { type: string }
                actor_user_id: { type: string, nullable: true }
                scheduled_by_name: { type: string, nullable: true }
                source: { type: string }
                workflow_run_id: { type: string, nullable: true }
                requires_review: { type: boolean }
      responses:
        "200":
          description: Created action
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  action: { type: object }
        "400":
          description: Invalid body or missing required field
        "401":
          description: Unauthorized
        "422":
          description: scheduled_for must be in the future

  /scheduled-actions/{id}/cancel:
    post:
      tags: [Scheduled Actions]
      summary: Cancel a pending scheduled action
      description: Auth via CRM session cookie or x-hl-internal-secret header. Marks the action cancelled; the Inngest executor bails when it reloads a non-pending row.
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Cancelled action
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  action: { type: object }
        "400":
          description: id required
        "401":
          description: Unauthorized
        "404":
          description: Not found or not pending

  # ── SISU TRANSACTIONS (HouseLoop Transactions) ───────────────────────────────

  /sisu-transactions:
    get:
      tags: [SISU Transactions]
      summary: List transactions (paginated) with a rollup summary
      parameters:
        - name: year
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
        - name: agent
          in: query
          required: false
          schema: { type: string }
        - name: type
          in: query
          required: false
          schema: { type: string }
        - name: brokerage_id
          in: query
          required: false
          schema: { type: integer }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 10, maximum: 200, default: 100 }
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  transactions:
                    type: array
                    items: { type: object }
                  summary: { type: object }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
    post:
      tags: [SISU Transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent, address, status]
              properties:
                agent: { type: string }
                client_first_name: { type: string }
                client_last_name: { type: string }
                client_phone: { type: string }
                client_email: { type: string }
                address: { type: string }
                transaction_type: { type: string }
                status: { type: string }
                transaction_amount: { type: number }
                gci: { type: number }
                signed_date: { type: string, format: date }
                under_contract_date: { type: string, format: date }
                closed_date: { type: string, format: date }
                forecasted_close_date: { type: string, format: date }
                lead_source: { type: string }
                lead_type: { type: string }
                notes: { type: string }
                houseloop_lead_id: { type: integer }
                brokerage_id: { type: integer }
      responses:
        "200":
          description: Created transaction
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  transaction: { type: object }
        "400":
          description: agent, address, status required

  /sisu-transactions/{id}:
    patch:
      tags: [SISU Transactions]
      summary: Update editable transaction fields (id is an integer key)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                brokerage_id: { type: integer }
                status: { type: string }
                transaction_amount: { type: number }
                gci: { type: number }
                signed_date: { type: string, format: date }
                under_contract_date: { type: string, format: date }
                closed_date: { type: string, format: date }
                forecasted_close_date: { type: string, format: date }
                notes: { type: string }
                agent: { type: string }
                address: { type: string }
                client_first_name: { type: string }
                client_last_name: { type: string }
                transaction_type: { type: string }
                representing: { type: string }
                second_client_first_name: { type: string }
                second_client_last_name: { type: string }
                escrow_number: { type: string }
                paid_date: { type: string, format: date }
                lead_source: { type: string }
                lead_type: { type: string }
                commission_pct: { type: number }
                team: { type: string }
                tc: { type: string }
                title_company: { type: string }
                mortgage_company: { type: string }
                home_inspection_company: { type: string }
                home_warranty_company: { type: string }
                insurance_company: { type: string }
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  transaction: { type: object }
        "404":
          description: Not found

  /sisu-transactions/{id}/commission:
    get:
      tags: [SISU Transactions]
      summary: Get a transaction's commission form (auto-creates a default on first read)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Form, adjustments, splits, and computed math
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  form: { type: object }
                  adjustments:
                    type: array
                    items: { type: object }
                  splits:
                    type: array
                    items: { type: object }
                  computed: { type: object, nullable: true }
        "400":
          description: Invalid id
        "404":
          description: Transaction not found
    put:
      tags: [SISU Transactions]
      summary: Atomically save a commission form (form + adjustments + splits)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                form: { type: object }
                adjustments:
                  type: array
                  items: { type: object }
                splits:
                  type: array
                  items: { type: object }
                actor: { type: string }
      responses:
        "200":
          description: Saved form with recomputed math
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  form: { type: object }
                  adjustments:
                    type: array
                    items: { type: object }
                  splits:
                    type: array
                    items: { type: object }
                  computed: { type: object, nullable: true }
        "400":
          description: Invalid id

  /sisu-transactions/{id}/commission/certify:
    post:
      tags: [SISU Transactions]
      summary: Certify (or uncertify) a commission form
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                actor: { type: string }
                uncertify: { type: boolean }
      responses:
        "200":
          description: Updated form
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  form: { type: object }
        "400":
          description: Invalid id
        "404":
          description: Commission form not found — save it first

  /sisu-transactions/brokerage-settings:
    get:
      tags: [SISU Transactions]
      summary: Get brokerage commission settings (one brokerage, or all active)
      parameters:
        - name: brokerage_id
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Brokerage settings (or list when brokerage_id omitted)
          content:
            application/json:
              schema:
                type: object
                properties:
                  brokerages:
                    type: array
                    items: { type: object }
                  brokerage: { type: object }
        "400":
          description: invalid brokerage_id
        "404":
          description: not found
    put:
      tags: [SISU Transactions]
      summary: Atomically replace one section of a brokerage's settings (legacy = read-only)
      parameters:
        - name: brokerage_id
          in: query
          required: true
          schema: { type: integer }
        - name: section
          in: query
          required: true
          schema:
            type: string
            enum: [tiers, exp_fees, flat_fee_defaults, referral_sources, adjustment_categories, monthly_marketing, default_split_pct, logo_url]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value: {}
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  settings: { type: object }
        "400":
          description: invalid brokerage_id, section, or missing value
        "403":
          description: brokerage is legacy and read-only
        "404":
          description: brokerage not found
    post:
      tags: [SISU Transactions]
      summary: Create a new brokerage with default settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name]
              properties:
                slug: { type: string }
                name: { type: string }
                license_state: { type: string }
                parent_brand: { type: string }
                managing_broker: { type: string }
                logo_url: { type: string }
      responses:
        "200":
          description: Created brokerage id
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  id: { type: integer }
        "400":
          description: slug + name required

  /sisu-transactions/exp-grid/email:
    post:
      tags: [SISU Transactions]
      summary: Email the rendered EXP Grid HTML to the internal team
      description: Auth via CRM session cookie or x-hl-internal-secret header. Sends from a connected Google account (default admin@houseloop.ai).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipients, html]
              properties:
                recipients:
                  type: array
                  items: { type: string, format: email }
                address: { type: string }
                html: { type: string }
                from_email: { type: string, format: email }
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  gmail_message_id: { type: string }
                  recipients:
                    type: array
                    items: { type: string }
                  from_email: { type: string }
        "400":
          description: invalid_json, no valid recipients, or html required
        "401":
          description: Unauthorized
        "422":
          description: from_email not connected or token refresh failed
        "502":
          description: Gmail send failed

  /sisu-transactions/hl-leads:
    get:
      tags: [SISU Transactions]
      summary: List HouseLoop CRM leads (or one expanded lead) for the transaction Add flow
      parameters:
        - name: id
          in: query
          required: false
          schema: { type: integer }
          description: When provided, returns a single expanded lead for prefill
      responses:
        "200":
          description: Leads (or one lead)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  leads:
                    type: array
                    items: { type: object }
                  lead: { type: object }
        "404":
          description: lead not found

  /sisu-transactions/summary:
    get:
      tags: [SISU Transactions]
      summary: Year-scoped transaction KPIs, monthly chart, and agent breakdown
      parameters:
        - name: year
          in: query
          required: false
          schema: { type: integer }
        - name: brokerage_id
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  kpis: { type: object }
                  monthlyChart:
                    type: array
                    items: { type: object }
                  agentBreakdown:
                    type: array
                    items: { type: object }
                  availableYears:
                    type: array
                    items: { type: integer }
                  availableAgents:
                    type: array
                    items: { type: string }
# ─────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: hl_session
      description: |
        Browser session. A human logs in at POST /api/auth/login and receives
        the signed `hl_session` cookie. Used by the CRM web UI.
    internalSecret:
      type: apiKey
      in: header
      name: x-hl-internal-secret
      description: |
        Machine-to-machine auth. Any trusted backend caller (Myli, the
        scheduled-action executor, internal jobs, AI agents) may send the
        `x-hl-internal-secret` header instead of a session cookie to call any
        endpoint a human can. The secret is server-only (never reaches a
        browser) and is stored in the credential vault as HL_INTERNAL_SECRET.
        This is how an AI does everything a logged-in human can do.

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Ok:
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: true }

    OkId:
      description: Created / success with returned ID
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: true }
              id: { type: string, format: uuid }

    OkUser:
      description: Authenticated user
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean }
              user: { $ref: "#/components/schemas/User" }

    OkStage:
      description: Stage
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean }
              stage: { $ref: "#/components/schemas/Stage" }

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: false }
              error: { type: string, example: not_found }

    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              ok: { type: boolean, example: false }
              error: { type: string, example: unauthorized }

  schemas:

    Lead:
      type: object
      properties:
        id: { type: string, format: uuid }
        first_name: { type: string }
        last_name: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
        source: { type: string }
        source_id: { type: string, format: uuid, nullable: true }
        stage_id: { type: string, format: uuid, nullable: true }
        stage_name: { type: string, nullable: true }
        stage_color: { type: string, nullable: true }
        pipeline_id: { type: string, format: uuid, nullable: true }
        assigned_user_id: { type: string, format: uuid, nullable: true }
        assigned_user_name: { type: string, nullable: true }
        lead_score: { type: integer }
        last_communication_at: { type: string, format: date-time, nullable: true }
        open_task_count: { type: integer }
        overdue_task_count: { type: integer }
        next_task_due_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    LeadSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }

    CreateLeadBody:
      type: object
      required: [first_name, last_name, email]
      properties:
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string, description: "Stored as digits-only; UI formats as (407) 403-8088" }
        stage_id:
          type: string
          format: uuid
          nullable: true
          description: "Omit to auto-assign position 0 of the default pipeline"
        source_id:
          type: string
          format: uuid
          nullable: true
          description: "FK to hl_lead_sources — sets the lead's origin (Indeed, Zillow, Referral, etc.)"
        assigned_user_id:
          type: string
          format: uuid
          nullable: true
          description: "FK to hl_users — initial owner. Leave null to keep the lead unassigned."
        note:
          type: string
          description: "If non-empty, also inserts a hl_notes row tied to the lead with source='lead_creation'"

    Stage:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        position: { type: integer }
        color: { type: string, nullable: true }
        icon: { type: string }
        is_active: { type: boolean }
        is_terminal: { type: boolean }
        people: { type: integer, description: "Current leads in this stage" }
        days_avg: { type: number, nullable: true, description: "Average days leads spend here" }
        conversion: { type: number, nullable: true, description: "% that moved forward" }

    LeadSource:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string }
        color: { type: string, nullable: true }
        source_type: { type: string }
        default_stage_id: { type: string, format: uuid, nullable: true }
        default_stage_name: { type: string, nullable: true }
        is_active: { type: boolean }
        total_leads: { type: integer }

    Tag:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string, nullable: true }
        lead_count: { type: integer }

    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        lead_id: { type: string, format: uuid }
        status: { type: string, enum: [open, done] }
        due_at: { type: string, format: date-time, nullable: true }
        assigned_user_id: { type: string, format: uuid, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    EmailTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        key: { type: string, nullable: true }
        category: { type: string, nullable: true }
        subject: { type: string, nullable: true }
        body: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    EmailCampaign:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        type:
          type: string
          enum: [listing_alert, open_house, market_report, outreach_sequence, one_time_blast]
        status:
          type: string
          enum: [draft, scheduled, sending, sent, cancelled]
        list_id: { type: string, format: uuid, nullable: true }
        template_id: { type: string, format: uuid, nullable: true }
        subject: { type: string, nullable: true }
        scheduled_at: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    EmailCampaignDetail:
      allOf:
        - $ref: "#/components/schemas/EmailCampaign"
        - type: object
          properties:
            list_name: { type: string, nullable: true }
            list_member_count: { type: integer, nullable: true }
            template_name: { type: string, nullable: true }
            template_body: { type: string, nullable: true }
            template_subject: { type: string, nullable: true }
            template_category: { type: string, nullable: true }

    CreateCampaignBody:
      type: object
      required: [name]
      properties:
        name: { type: string }
        type:
          type: string
          enum: [listing_alert, open_house, market_report, outreach_sequence, one_time_blast]
        status:
          type: string
          enum: [draft, scheduled, sending, sent, cancelled]
          default: draft
        list_id: { type: string, format: uuid, nullable: true }
        template_id: { type: string, format: uuid, nullable: true }
        subject: { type: string }
        notes: { type: string }
        scheduled_at: { type: string, format: date-time }

    TextTemplate:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        body: { type: string, description: "Supports {{first_name}}, {{last_name}}, {{agent_name}} merge tags" }
        category: { type: string, nullable: true }
        visibility: { type: string, enum: [public, private] }
        created_at: { type: string, format: date-time }

    CalendarEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        lead_id: { type: string, format: uuid, nullable: true }
        start_at: { type: string, format: date-time }
        end_at: { type: string, format: date-time }
        location: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        google_event_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    CreateCalendarEventBody:
      type: object
      required: [title, start_at, end_at]
      properties:
        title: { type: string }
        lead_id: { type: string, format: uuid, nullable: true }
        start_at: { type: string, format: date-time }
        end_at: { type: string, format: date-time }
        location: { type: string }
        notes: { type: string }

    SmartFilter:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        criteria:
          type: array
          items: { type: object }
        created_at: { type: string, format: date-time }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        full_name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [admin, agent, viewer] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    SendingInbox:
      type: object
      description: |
        A configured org-level sending inbox (Gmail-connected). Used by
        campaigns + transactional sends. `purpose` segregates warming +
        deliverability — never use an `outreach` inbox for transactional mail.
      properties:
        id:        { type: string, format: uuid }
        email:     { type: string, format: email }
        label:     { type: string }
        purpose:   { type: string, enum: [outreach, nurture, transactional, alerts, marketing] }
        plan:      { type: string, description: "Instantly plan tag or 'native'" }
        connected: { type: boolean }
        warmup_active: { type: boolean }
        warmup_score:  { type: number, nullable: true }
        created_at: { type: string, format: date-time }
